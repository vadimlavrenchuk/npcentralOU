# MechanicPro — положить на сервер в NPM data:
#   /root/proxy/data/nginx/proxy_host/3.conf
# (в UI NPM хост может отсутствовать; без этого файла HTTPS даёт ERR_SSL_UNRECOGNIZED_NAME_ALERT)
# После правок: docker exec proxy_app_1 nginx -t && docker exec proxy_app_1 nginx -s reload
#
# Сертификат: /etc/letsencrypt/live/npm-3/ (SAN: verifed-est.ee)

server {
  listen 80;
  listen 443 ssl;
  http2 on;
  server_name verifed-est.ee;

  ssl_certificate /etc/letsencrypt/live/npm-3/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/npm-3/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  if ($scheme = http) {
    return 301 https://$host$request_uri;
  }

  location ^~ /.well-known/acme-challenge/ {
    root /data/letsencrypt-acme-challenge;
  }

  location /api/ {
    proxy_pass http://172.17.0.1:5005;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /health {
    proxy_pass http://172.17.0.1:5005;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ~* \.html$ {
    root /var/www/mechanic-pro-demo/frontend;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    root /var/www/mechanic-pro-demo/frontend;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    root /var/www/mechanic-pro-demo/frontend;
    try_files $uri $uri/ /index.html;
    index index.html;
  }
}
